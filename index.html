<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>黑盒子｜行銷廣告專案管理</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { 
      --brand: #AE8E53; 
      --bg: #F6F5F2; 
      --paper: #fff; 
      --line: rgba(21,21,21,.08); 
      --r: 24px;
      /* 馬卡龍色系定義 */
      --m-blue: #AEC6CF;
      --m-green: #B2E2A2;
      --m-pink: #FFB7B2;
      --m-grey: #D3D3D3;
    }
    * { box-sizing: border-box; }
    body { background: var(--bg); color: #151515; font-family: system-ui, -apple-system, sans-serif; margin: 0; }
    
    /* 頂部導航欄 (對齊設計圖) */
    header { 
      background: var(--bg);
      padding: 30px 40px 10px;
      display: flex; justify-content: space-between; align-items: center; 
    }
    h1 { margin: 0; font-size: 32px; font-weight: 900; letter-spacing: -1px; }

    /* 工具列 (篩選器) */
    .toolbar { padding: 10px 40px 20px; }
    #yearSelect {
      background: #888; color: #fff; border: none;
      padding: 10px 24px; border-radius: 999px;
      font-weight: 700; cursor: pointer; outline: none;
    }

    /* 按鈕樣式 */
    .btn { 
      border: 1px solid var(--line); background: #fff; 
      padding: 12px 24px; border-radius: 999px; 
      font-weight: 900; cursor: pointer; transition: 0.2s; font-size: 15px; 
    }
    .btn.primary { background: #fff; color: #151515; border: 2px solid #151515; }
    .btn.primary:hover { background: #151515; color: #fff; }

    /* 專案圖卡網格 (對齊設計圖) */
    main { max-width: 1400px; margin: 0 auto; padding: 0 40px 60px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 24px; }
    
    .card { 
      background: #999; /* 預設深灰色底，可根據需求調整 */
      aspect-ratio: 3/4; padding: 30px; border-radius: 28px; 
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-align: center;
    }
    .card:hover { transform: translateY(-8px); filter: brightness(1.05); }
    .card-title { font-size: 24px; font-weight: 900; color: #151515; margin-bottom: 12px; }
    .card-meta { font-size: 13px; color: rgba(21,21,21,0.6); line-height: 1.6; font-weight: 600; }

    /* 狀態燈號 */
    .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
    .dot-blue { background: var(--m-blue); }
    .dot-green { background: var(--m-green); }
    .dot-red { background: var(--m-pink); }
    .dot-grey { background: var(--m-grey); }

    /* 彈窗樣式優化 */
    .modal { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; padding: 16px; backdrop-filter: blur(8px); }
    .modal-content { background: #fff; width: 100%; max-width: 700px; border-radius: 32px; padding: 40px; max-height: 90vh; overflow-y: auto; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    .full { grid-column: 1 / -1; }
    label { display: block; font-size: 14px; font-weight: 900; color: #151515; margin-bottom: 8px; }
    label span { font-size: 10px; color: #aaa; font-weight: normal; margin-left: 6px; text-transform: uppercase; }
    input, select, textarea { width: 100%; padding: 14px; border-radius: 16px; border: 1.5px solid #eee; outline: none; background: #fafafa; font-size: 15px; }
    
    /* 門市排版優化 */
    .checkbox-group { display: flex; gap: 20px; flex-wrap: wrap; padding: 15px; border: 1.5px solid #eee; border-radius: 16px; background: #fafafa; }
    .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 15px; cursor: pointer; white-space: nowrap; font-weight: 600; }
    .checkbox-item input { width: 20px; height: 20px; cursor: pointer; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <header>
    <h1>行銷廣告專案計劃表</h1>
    <button id="btnOpenAdd" class="btn primary">＋ 新增專案</button>
  </header>

  <div class="toolbar">
    <select id="yearSelect">
      <option value="ALL">年度篩選器</option>
    </select>
  </div>

  <main id="listPage">
    <div id="projectGrid" class="grid">載入中...</div>
  </main>

  <div id="addModal" class="modal hidden">
    <div class="modal-content">
      <h2 style="margin-top:0; font-size: 28px; letter-spacing: -1px;">新建專案</h2>
      <div class="form-grid">
        <div class="form-group full"><label>專案名稱<span>TITLE</span></label><input id="pTitle" placeholder="如：春季 iPhone 電池更換特惠"></div>
        <div class="form-group"><label>專案年度<span>YEAR</span></label><input type="number" id="pYear" value="2026"></div>
        <div class="form-group"><label>主打項目<span>PRODUCT</span></label><input id="pProduct" placeholder="電池更換/資料救援..."></div>
        <div class="form-group"><label>行銷主題<span>THEME</span></label><input id="pTheme" placeholder="春天/沙灘/中秋..."></div>
        
        <div class="form-group full">
          <label>投放平台<span>PLATFORMS</span></label>
          <div class="checkbox-group">
            <label class="checkbox-item"><input type="checkbox" name="platform" value="META"> META</label>
            <label class="checkbox-item"><input type="checkbox" name="platform" value="GOOGLE"> GOOGLE</label>
            <label class="checkbox-item"><input type="checkbox" name="platform" value="LINE"> LINE</label>
            <label class="checkbox-item"><input type="checkbox" name="platform" value="TIKTOK"> TIKTOK</label>
          </div>
        </div>

        <div class="form-group full">
          <label>執行門市<span>STORE</span></label>
          <div class="checkbox-group">
            <label class="checkbox-item"><input type="checkbox" name="store" value="勤美公益店"> 勤美公益店</label>
            <label class="checkbox-item"><input type="checkbox" name="store" value="沙鹿站前店"> 沙鹿站前店</label>
          </div>
        </div>

        <div class="form-group"><label>行銷目標<span>OBJECTIVE</span></label><input id="pObjective" placeholder="MSG/LEAD/CALL"></div>
        <div class="form-group">
          <label>專案狀態<span>STATUS</span></label>
          <select id="pStatus">
            <option value="規劃中">● 規劃中</option>
            <option value="投放中">● 投放中</option>
            <option value="調整中">● 調整中</option>
            <option value="結案">● 結案</option>
          </select>
        </div>
        <div class="form-group"><label>開始日期<span>START_DATE</span></label><input type="date" id="pStart"></div>
        <div class="form-group"><label>結束日期<span>END_DATE</span></label><input type="date" id="pEnd"></div>
        <div class="form-group full"><label>專案備註<span>NOTES</span></label><textarea id="pNotes" rows="2" placeholder="詳細計畫內容..."></textarea></div>
      </div>
      <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:32px;">
        <button id="btnCancel" class="btn">取消</button>
        <button id="btnConfirm" class="btn primary">建立專案</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // 防止重複宣告，使用自定義物件封裝
      const APP_CONFIG = {
        URL: "https://udycidkswyqasnzwlmqv.supabase.co",
        KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkeWNpZGtzd3lxYXNuendsbXF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2ODYzNzUsImV4cCI6MjA4ODI2MjM3NX0.Gu68eely_7xJrRBAuevEXzPt93Hnzr1fVwnz3SSp3pk"
      };
      
      const client = window.supabase.createClient(APP_CONFIG.URL, APP_CONFIG.KEY);

      const ui = {
        grid: document.getElementById('projectGrid'),
        addModal: document.getElementById('addModal'),
        btnOpenAdd: document.getElementById('btnOpenAdd'),
        yearSelect: document.getElementById('yearSelect')
      };

      async function fetchAll() {
        ui.grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; font-weight: 700;">同步看板中...</div>';
        const { data, error } = await client.from('projects').select('*').order('created_at', { ascending: false });
        if (error) { ui.grid.innerHTML = '載入失敗'; return; }
        
        // 更新年度篩選器
        const years = [...new Set(data.map(p => p.year))].sort((a,b) => b-a);
        ui.yearSelect.innerHTML = '<option value="ALL">年度篩選器</option>' + years.map(y => `<option value="${y}">${y} 年度</option>`).join('');

        ui.grid.innerHTML = data.map(p => {
          let dotClass = 'dot-grey';
          // 移除可能存在的標記字元後判斷狀態
          const status = p.status.replace(/[●🔵🟢🔴⚪]\s/, "");
          if(status === '規劃中') dotClass = 'dot-blue';
          if(status === '投放中') dotClass = 'dot-green';
          if(status === '調整中') dotClass = 'dot-red';

          return `
          <div class="card" onclick="alert('專案 ID: ${p.id}')">
            <div class="card-title">專案<br>圖卡</div>
            <div class="card-meta">
              <strong>${p.title}</strong><br>
              ${p.store || '未設定'}<br>
              <div style="margin-top:12px; display:flex; align-items:center; justify-content:center;">
                <span class="status-dot ${dotClass}"></span>
                <span style="font-weight:900; color:#151515;">${status}</span>
              </div>
            </div>
          </div>
        `}).join('') || '<div style="grid-column: 1/-1; text-align: center; padding: 40px;">目前沒有專案</div>';
      }

      ui.btnOpenAdd.onclick = () => ui.addModal.classList.remove('hidden');
      document.getElementById('btnCancel').onclick = () => ui.addModal.classList.add('hidden');

      document.getElementById('btnConfirm').onclick = async () => {
        const btn = document.getElementById('btnConfirm');
        const platforms = Array.from(document.querySelectorAll('input[name="platform"]:checked')).map(i => i.value).join(', ');
        const stores = Array.from(document.querySelectorAll('input[name="store"]:checked')).map(i => i.value).join(', ');

        const rawStatus = document.getElementById('pStatus').value;
        const cleanStatus = rawStatus.replace(/●\s/, "");

        const projectData = {
          title: document.getElementById('pTitle').value,
          year: parseInt(document.getElementById('pYear').value),
          product: document.getElementById('pProduct').value,
          theme: document.getElementById('pTheme').value,
          platforms: platforms,
          store: stores,
          objective: document.getElementById('pObjective').value,
          status: cleanStatus,
          start_date: document.getElementById('pStart').value || null,
          end_date: document.getElementById('pEnd').value || null,
          notes: document.getElementById('pNotes').value
        };

        if(!projectData.title) return alert('專案名稱必填！');

        btn.disabled = true;
        btn.innerText = '建立中...';
        const { error } = await client.from('projects').insert([projectData]);
        
        if (error) alert('儲存失敗：' + error.message);
        else {
          ui.addModal.classList.add('hidden');
          // 清空欄位
          document.querySelectorAll('#addModal input:not([type="number"]), #addModal textarea').forEach(i => i.value = '');
          document.querySelectorAll('#addModal input[type="checkbox"]').forEach(i => i.checked = false);
          fetchAll();
        }
        btn.disabled = false;
        btn.innerText = '建立專案';
      };

      fetchAll();
    })();
  </script>
</body>
</html>
