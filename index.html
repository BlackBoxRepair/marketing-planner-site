<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>黑盒子｜行銷廣告專案計劃表</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --brand: #AE8E53; --bg: #F6F5F2; --paper: #fff; --text: #151515; --muted: rgba(21,21,21,.58); --line: rgba(21,21,21,.10); --r: 22px; }
    * { box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, "PingFang TC", sans-serif; margin: 0; }
    .hidden { display: none !important; }
    header { position: sticky; top: 0; z-index: 20; background: rgba(246,245,242,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--line); padding: 16px; display: flex; justify-content: space-between; align-items: center; }
    h1 { margin: 0; font-size: 24px; font-weight: 900; }
    .btn { border: 1px solid var(--line); background: #fff; padding: 10px 16px; border-radius: 999px; font-weight: 900; cursor: pointer; transition: .12s; }
    .btn.primary { background: var(--brand); color: #fff; border-color: var(--brand); }
    main { max-width: 1100px; margin: 0 auto; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; }
    .card { background: #fff; padding: 20px; border-radius: var(--r); border: 1px solid var(--line); cursor: pointer; box-shadow: 0 4px 12px rgba(0,0,0,.05); }
    .modal { position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal-card { background: #fff; width: 100%; max-width: 800px; border-radius: var(--r); padding: 24px; max-height: 90vh; overflow-y: auto; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
    label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 900; color: var(--muted); }
    input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--line); outline: none; }
    .notice { background: var(--brand); color: #fff; padding: 12px; border-radius: 12px; margin-bottom: 16px; text-align: center; font-weight: bold; }
  </style>
</head>
<body>

  <header>
    <h1>廣告專案計畫表</h1>
    <div style="display:flex; gap:10px;">
      <button id="btnBack" class="btn hidden">回首頁</button>
      <button id="btnNewProject" class="btn primary">新增專案</button>
    </div>
  </header>

  <main>
    <div id="sysMsg" class="notice hidden"></div>
    
    <section id="viewList">
      <div id="grid" class="grid">正在載入專案...</div>
    </section>

    <section id="viewDetail" class="hidden">
      <div style="background:#fff; padding:20px; border-radius:var(--r); border:1px solid var(--line);">
        <h3>專案詳情</h3>
        <div id="detailFields" class="form-grid">
            </div>
        <button id="btnSaveProject" class="btn primary" style="margin-top:20px;">儲存變更</button>
      </div>
    </section>
  </main>

  <div id="mProject" class="modal hidden">
    <div class="modal-card">
      <h2>建立新廣告專案</h2>
      <div class="form-grid">
        <div><label>年度</label><input id="pYear" type="number" value="2026"></div>
        <div style="grid-column: span 2;"><label>專案名稱</label><input id="pTitle" placeholder="如：夏季手機維修大賞"></div>
        <div><label>品項</label><input id="pProduct" placeholder="電池/螢幕/主板"></div>
        <div><label>門市</label><input id="pStore" placeholder="勤美/沙鹿"></div>
        <div><label>狀態</label><select id="pStatus"><option>規劃中</option><option>執行中</option><option>已結案</option></select></div>
      </div>
      <div style="margin-top:20px; display:flex; gap:10px;">
        <button id="btnSubmitProject" class="btn primary">確認建立</button>
        <button class="btn" onclick="toggleModal('mProject', false)">取消</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://udycidkswyqasnzwlmqv.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkeWNpZGtzd3lxYXNuendsbXF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2ODYzNzUsImV4cCI6MjA4ODI2MjM3NX0.Gu68eely_7xJrRBAuevEXzPt93Hnzr1fVwnz3SSp3pk";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const $ = id => document.getElementById(id);

    // 強化的 Modal 切換函數 [cite: 7, 27]
    function toggleModal(id, isShow) {
      const el = $(id);
      if (isShow) el.classList.remove('hidden');
      else el.classList.add('hidden');
    }

    // 初始化綁定 
    window.onload = () => {
      $('btnNewProject').onclick = () => toggleModal('mProject', true);
      $('btnBack').onclick = () => location.hash = '';
      loadProjects();
    };

    async function loadProjects() {
      const { data, error } = await supabase.from('projects').select('*').order('created_at', { ascending: false });
      if (error) return $('grid').innerHTML = "資料讀取失敗";
      
      $('grid').innerHTML = data.map(p => `
        <div class="card" onclick="location.hash='#project=${p.id}'">
          <strong>${p.title}</strong>
          <div style="font-size:12px; color:#888; margin-top:8px;">${p.year} | ${p.store} | ${p.status}</div>
        </div>
      `).join('');
    }

    $('btnSubmitProject').onclick = async () => {
      const btn = $('btnSubmitProject');
      btn.disabled = true;
      btn.innerText = "處理中...";

      const newData = {
        year: parseInt($('pYear').value),
        title: $('pTitle').value,
        product: $('pProduct').value,
        store: $('pStore').value,
        status: $('pStatus').value
      };

      const { data, error } = await supabase.from('projects').insert([newData]).select();
      
      if (error) {
        alert("建立失敗：" + error.message);
      } else {
        toggleModal('mProject', false);
        loadProjects();
        $('pTitle').value = ''; // 清空
      }
      btn.disabled = false;
      btn.innerText = "確認建立";
    };

    // 路由處理 [cite: 74]
    window.onhashchange = () => {
      const hash = location.hash;
      if (hash.includes('#project=')) {
        $('viewList').classList.add('hidden');
        $('viewDetail').classList.remove('hidden');
        $('btnBack').classList.remove('hidden');
        // 這裡可以加入讀取單一專案詳細資料的 api 調用
      } else {
        $('viewList').classList.remove('hidden');
        $('viewDetail').classList.add('hidden');
        $('btnBack').classList.add('hidden');
        loadProjects();
      }
    };
  </script>
</body>
</html>
