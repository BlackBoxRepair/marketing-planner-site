<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>黑盒子｜行銷廣告專案管理</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --brand: #AE8E53; --bg: #F6F5F2; --paper: #fff; --line: rgba(21,21,21,.10); --r: 20px; }
    * { box-sizing: border-box; }
    body { background: var(--bg); color: #151515; font-family: system-ui, sans-serif; margin: 0; }
    header { position: sticky; top: 0; z-index: 100; background: rgba(246,245,242,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--line); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
    h1 { margin: 0; font-size: 20px; font-weight: 900; }
    .btn { border: 1px solid var(--line); background: #fff; padding: 10px 18px; border-radius: 999px; font-weight: 900; cursor: pointer; transition: 0.2s; font-size: 14px; }
    .btn.primary { background: var(--brand); color: #fff; border-color: var(--brand); }
    main { max-width: 1100px; margin: 0 auto; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .card { background: #fff; padding: 20px; border-radius: var(--r); border: 1px solid var(--line); cursor: pointer; transition: 0.2s; }
    .card:hover { border-color: var(--brand); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    .hidden { display: none !important; }
    
    /* 彈窗樣式優化 */
    .modal { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; padding: 16px; backdrop-filter: blur(4px); }
    .modal-content { background: #fff; width: 100%; max-width: 700px; border-radius: var(--r); padding: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.15); max-height: 90vh; overflow-y: auto; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    .full { grid-column: 1 / -1; }
    label { display: block; font-size: 14px; font-weight: 900; color: #444; margin-bottom: 6px; }
    label span { font-size: 10px; color: #aaa; font-weight: normal; margin-left: 4px; }
    input, select, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--line); outline: none; background: #fafafa; font-size: 14px; }
    
    /* 多選清單樣式 */
    .checkbox-group { display: flex; gap: 12px; flex-wrap: wrap; padding: 10px; border: 1px solid var(--line); border-radius: 12px; background: #fafafa; }
    .checkbox-item { display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: pointer; }
    .checkbox-item input { width: auto; cursor: pointer; }

    /* 狀態燈號樣式 */
    .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
    .dot-blue { background: #3498db; }
    .dot-green { background: #2ecc71; }
    .dot-grey { background: #95a5a6; }
    .dot-red { background: #e74c3c; }
  </style>
</head>
<body>

  <header>
    <h1>黑盒子行銷計畫系統</h1>
    <div id="nav">
      <button id="btnOpenAdd" class="btn primary">＋ 新增專案</button>
      <button id="btnBack" class="btn hidden">← 回列表</button>
    </div>
  </header>

  <main>
    <div id="listPage" class="grid">載入中...</div>
  </main>

  <div id="addModal" class="modal hidden">
    <div class="modal-content">
      <h2 style="margin-top:0; font-size: 24px;">新建專案</h2>
      <div class="form-grid">
        <div class="form-group full"><label>專案名稱<span>TITLE</span></label><input id="pTitle" placeholder="如：2026 春季 iPhone 電池更換特惠"></div>
        <div class="form-group"><label>年度<span>YEAR</span></label><input type="number" id="pYear" value="2026"></div>
        <div class="form-group"><label>主打項目<span>PRODUCT</span></label><input id="pProduct" placeholder="電池更換/資料救援..."></div>
        <div class="form-group"><label>行銷主題<span>THEME</span></label><input id="pTheme" placeholder="春天/沙灘/中秋..."></div>
        
        <div class="form-group full">
          <label>投放平台<span>PLATFORMS</span></label>
          <div class="checkbox-group" id="pPlatformsGroup">
            <label class="checkbox-item"><input type="checkbox" name="platform" value="META"> META</label>
            <label class="checkbox-item"><input type="checkbox" name="platform" value="GOOGLE"> GOOGLE</label>
            <label class="checkbox-item"><input type="checkbox" name="platform" value="LINE"> LINE</label>
            <label class="checkbox-item"><input type="checkbox" name="platform" value="TIKTOK"> TIKTOK</label>
          </div>
        </div>

        <div class="form-group full">
          <label>執行門市<span>STORE</span></label>
          <div class="checkbox-group" id="pStoreGroup">
            <label class="checkbox-item"><input type="checkbox" name="store" value="勤美公益店"> 勤美公益店</label>
            <label class="checkbox-item"><input type="checkbox" name="store" value="沙鹿站前店"> 沙鹿站前店</label>
          </div>
        </div>

        <div class="form-group"><label>行銷目標<span>OBJECTIVE</span></label><input id="pObjective" placeholder="MSG/LEAD/CALL"></div>
        <div class="form-group">
          <label>專案狀態<span>STATUS</span></label>
          <select id="pStatus">
            <option value="規劃中">🔵 規劃中</option>
            <option value="投放中">🟢 投放中</option>
            <option value="調整中">🔴 調整中</option>
            <option value="結案">⚪ 結案</option>
          </select>
        </div>
        <div class="form-group"><label>開始日期<span>START_DATE</span></label><input type="date" id="pStart"></div>
        <div class="form-group"><label>結束日期<span>END_DATE</span></label><input type="date" id="pEnd"></div>
        <div class="form-group full"><label>專案備註<span>NOTES</span></label><textarea id="pNotes" rows="2"></textarea></div>
      </div>
      <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:24px;">
        <button id="btnCancel" class="btn">取消</button>
        <button id="btnConfirm" class="btn primary">建立專案</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const URL = "https://udycidkswyqasnzwlmqv.supabase.co";
      const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkeWNpZGtzd3lxYXNuendsbXF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2ODYzNzUsImV4cCI6MjA4ODI2MjM3NX0.Gu68eely_7xJrRBAuevEXzPt93Hnzr1fVwnz3SSp3pk";
      const client = window.supabase.createClient(URL, KEY);

      const listPage = document.getElementById('listPage');
      const addModal = document.getElementById('addModal');
      const btnOpenAdd = document.getElementById('btnOpenAdd');

      async function fetchAll() {
        listPage.innerHTML = '正在讀取行銷看板...';
        const { data, error } = await client.from('projects').select('*').order('created_at', { ascending: false });
        if (error) { listPage.innerHTML = '讀取失敗'; return; }
        
        listPage.innerHTML = data.map(p => {
          let dotClass = 'dot-grey';
          if(p.status === '規劃中') dotClass = 'dot-blue';
          if(p.status === '投放中') dotClass = 'dot-green';
          if(p.status === '調整中') dotClass = 'dot-red';

          return `
          <div class="card" onclick="alert('專案 ID: ${p.id}')">
            <div style="font-weight:900; font-size:18px; margin-bottom:8px;">${p.title}</div>
            <div style="font-size:12px; color:#888;">
              📍 ${p.store || '未設定'} | 🛠️ ${p.product || '未設定'}<br>
              📅 ${p.start_date || '-'} ~ ${p.end_date || '-'}<br>
              <div style="margin-top:8px; display:flex; align-items:center;">
                <span class="status-dot ${dotClass}"></span>
                <span style="font-weight:bold; color:#555;">${p.status}</span>
              </div>
            </div>
          </div>
        `}).join('') || '目前沒有專案';
      }

      btnOpenAdd.onclick = () => addModal.classList.remove('hidden');
      document.getElementById('btnCancel').onclick = () => addModal.classList.add('hidden');

      document.getElementById('btnConfirm').onclick = async () => {
        const btn = document.getElementById('btnConfirm');
        
        // 取得多選平台的資料
        const platforms = Array.from(document.querySelectorAll('input[name="platform"]:checked')).map(i => i.value).join(', ');
        // 取得多選門市的資料
        const stores = Array.from(document.querySelectorAll('input[name="store"]:checked')).map(i => i.value).join(', ');

        const projectData = {
          title: document.getElementById('pTitle').value,
          year: parseInt(document.getElementById('pYear').value),
          product: document.getElementById('pProduct').value,
          theme: document.getElementById('pTheme').value,
          platforms: platforms,
          store: stores,
          objective: document.getElementById('pObjective').value,
          status: document.getElementById('pStatus').value.replace(/[🔵🟢🔴⚪]\s/, ""), // 移除 Emoji 存入資料庫
          start_date: document.getElementById('pStart').value || null,
          end_date: document.getElementById('pEnd').value || null,
          notes: document.getElementById('pNotes').value
        };

        if(!projectData.title) return alert('專案名稱必填！');

        btn.disabled = true;
        const { error } = await client.from('projects').insert([projectData]);
        
        if (error) alert('儲存失敗：' + error.message);
        else {
          addModal.classList.add('hidden');
          document.querySelectorAll('#addModal input[type="text"], #addModal input[type="number"], #addModal textarea').forEach(i => i.value = '');
          document.querySelectorAll('#addModal input[type="checkbox"]').forEach(i => i.checked = false);
          fetchAll();
        }
        btn.disabled = false;
      };

      fetchAll();
    })();
  </script>
</body>
</html>
