<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>行銷廣告專案計劃表</title>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --brand: #AE8E53;
      --brand-ink: #6E572C;

      --bg: #F6F5F2;
      --paper: #FFFFFF;
      --paper-2: #FBFAF8;

      --text: #151515;
      --muted: rgba(21,21,21,.58);

      --line: rgba(21,21,21,.08);
      --line-strong: rgba(21,21,21,.12);

      --shadow-1: 0 10px 28px rgba(0,0,0,.06);
      --shadow-2: 0 18px 52px rgba(0,0,0,.10);

      --r-xl: 26px;
      --r-lg: 18px;

      --focus: rgba(174,142,83,.22);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "PingFang TC", "Microsoft JhengHei", Arial;
      -webkit-font-smoothing: antialiased;
      letter-spacing: .2px;
    }

    .topbar{
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(246,245,242,.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      padding: 18px 20px 14px;
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap: 14px;
    }
    .title-block{display:flex;flex-direction:column;gap:6px}
    .kicker{
      font-size: 12px;
      letter-spacing: .22em;
      font-weight: 900;
      color: var(--brand);
    }
    .title{
      margin:0;
      font-size: 34px;
      font-weight: 900;
      letter-spacing: .02em;
    }
    .right{display:flex;gap:10px;align-items:center}

    .page{
      max-width: 1140px;
      margin: 0 auto;
      padding: 18px 18px 64px;
    }

    .pill{
      border: 1px solid var(--line);
      background: rgba(255,255,255,.85);
      color: var(--text);
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 900;
      cursor:pointer;
      text-decoration:none;
      box-shadow: 0 10px 20px rgba(0,0,0,.06);
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease, border-color .15s ease;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }
    .pill:hover{
      transform: translateY(-1px);
      box-shadow: var(--shadow-1);
      border-color: var(--line-strong);
    }
    .pill-primary{
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
      box-shadow: 0 14px 28px rgba(174,142,83,.28);
    }
    .pill-primary:hover{
      background: var(--brand-ink);
      border-color: var(--brand-ink);
      box-shadow: 0 18px 42px rgba(110,87,44,.26);
    }

    .toolbar{position:relative;margin:14px 0 18px;display:flex;gap:12px;flex-wrap:wrap}
    .pill-filter{
      min-width: 240px;
      justify-content:center;
      background: rgba(255,255,255,.70);
    }

    .dropdown{
      position:absolute;
      top: 54px;
      left: 0;
      width: 240px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-1);
      padding: 8px;
    }
    .hidden{display:none}
    .dropdown-item{
      padding: 10px 12px;
      border-radius: 14px;
      cursor:pointer;
      font-weight: 800;
      color: rgba(21,21,21,.80);
      transition: background .12s ease;
    }
    .dropdown-item:hover{
      background: rgba(174,142,83,.10);
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 18px;
    }
    @media(max-width:980px){ .grid{ grid-template-columns: repeat(2, 1fr); } }
    @media(max-width:520px){ .grid{ grid-template-columns: 1fr; } }

    .card{
      background: var(--paper);
      border: 1px solid rgba(21,21,21,.06);
      border-radius: var(--r-xl);
      padding: 18px;
      box-shadow: var(--shadow-1);
      cursor:pointer;
      min-height: 180px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
      position: relative;
      overflow: hidden;
    }
    .card::before{
      content:"";
      position:absolute;
      inset: 0;
      background: radial-gradient(900px 280px at 20% 0%, rgba(174,142,83,.18), transparent 55%);
      pointer-events:none;
      opacity: .9;
    }
    .card:hover{
      transform: translateY(-2px);
      box-shadow: var(--shadow-2);
      border-color: rgba(174,142,83,.20);
    }
    .card .big{
      font-size: 22px;
      font-weight: 950;
      line-height: 1.2;
      letter-spacing: .02em;
    }
    .card .meta{
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.65;
    }

    .panel{
      background: var(--paper);
      border: 1px solid rgba(21,21,21,.06);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow-1);
      padding: 18px;
      margin: 14px 0;
    }
    .panel-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .panel-title{
      font-size: 16px;
      font-weight: 950;
      letter-spacing: .02em;
    }
    .panel-actions{display:flex;gap:10px;flex-wrap:wrap}

    .label{
      font-size: 12px;
      color: rgba(21,21,21,.55);
      margin-bottom: 8px;
      font-weight: 900;
    }
    .info-grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 12px;
    }
    @media(max-width:900px){ .info-grid{ grid-template-columns: 1fr; } }

    input, select{
      width:100%;
      padding: 14px 14px;
      border-radius: 18px;
      border: 1px solid rgba(21,21,21,.08);
      background: var(--paper-2);
      outline:none;
      font-size: 14px;
      transition: box-shadow .12s ease, border-color .12s ease, background .12s ease;
    }
    input:focus, select:focus{
      border-color: rgba(174,142,83,.45);
      background: #fff;
      box-shadow: 0 0 0 4px var(--focus);
    }
    .full{grid-column:1 / -1}

    .stack{display:flex;flex-direction:column;gap:12px}

    .item{
      background: var(--paper);
      border: 1px solid rgba(21,21,21,.06);
      border-radius: var(--r-lg);
      padding: 14px;
      display:flex;
      justify-content:space-between;
      gap: 12px;
      align-items:flex-start;
    }
    .item .t{font-weight:950}
    .item .s{
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.6;
    }
    .item .actions{display:flex;gap:10px;flex-wrap:wrap}

    .msg{font-size:12px;color:rgba(21,21,21,.6)}

    /* Modal (可捲動、不會卡、可點背景關) */
    .modal{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.22);
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding: 18px;
      overflow:auto;
      z-index: 60;
    }
    .modal-card{
      width: min(920px, 100%);
      background: var(--paper);
      border: 1px solid rgba(21,21,21,.10);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow-2);
      padding: 18px;
      margin-top: 70px;
      max-height: calc(100vh - 120px);
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }
    .modal-head{
      position: sticky;
      top: 0;
      background: var(--paper);
      padding-bottom: 10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(21,21,21,.06);
    }
    .modal-title{font-size: 18px;font-weight: 950;}
    .form{display:flex;flex-direction:column;gap:12px}
    .form-row{
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 12px;
    }
    @media(max-width:900px){ .form-row{ grid-template-columns: 1fr; } }
    .actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

    /* View switch */
    .view.hidden{display:none}
  </style>
</head>
<body>

  <!-- ====== Topbar (會依 view 切標題) ====== -->
  <header class="topbar">
    <div class="title-block">
      <div class="kicker" id="kicker">MARKETING</div>
      <h1 class="title" id="topTitle">行銷廣告專案計劃表</h1>
    </div>
    <div class="right">
      <button id="btnBack" class="pill hidden">回選單</button>
      <button id="btnOpenNewProject" class="pill pill-primary">新增專案按鈕</button>
    </div>
  </header>

  <main class="page">
    <!-- ====== View 1: 專案卡片牆 ====== -->
    <section id="viewProjects" class="view">
      <section class="toolbar">
        <div class="pill pill-filter" id="yearPill">年度篩選器</div>
        <div id="yearDropdown" class="dropdown hidden">
          <div class="dropdown-item" data-year="ALL">全部年度</div>
          <div id="yearOptions"></div>
        </div>
      </section>

      <section id="grid" class="grid"></section>
    </section>

    <!-- ====== View 2: 專案詳情 ====== -->
    <section id="viewProjectDetail" class="view hidden">
      <section class="panel">
        <div class="panel-head">
          <div class="panel-title">專案資訊</div>
          <div class="panel-actions">
            <button id="btnInitWeeks" class="pill">一鍵建立 W1~W4</button>
            <button id="btnSaveProject" class="pill pill-primary">儲存</button>
          </div>
        </div>

        <div class="info-grid">
          <label><div class="label">年度</div><input id="fYear" type="number" /></label>
          <label><div class="label">專案名稱</div><input id="fTitle" /></label>
          <label><div class="label">品項</div><input id="fProduct" /></label>

          <label><div class="label">主題</div><input id="fTheme" /></label>
          <label><div class="label">平台</div><input id="fPlatforms" /></label>
          <label><div class="label">門市</div><input id="fStore" /></label>

          <label><div class="label">目標</div><input id="fObjective" /></label>
          <label><div class="label">狀態</div><input id="fStatus" /></label>
          <label><div class="label">開始日</div><input id="fStart" type="date" /></label>

          <label><div class="label">結束日</div><input id="fEnd" type="date" /></label>
          <label class="full"><div class="label">備註</div><input id="fNotes" /></label>
        </div>

        <div id="pmsg" class="msg"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div class="panel-title">W1~W4 投放節奏</div>
        </div>
        <div id="weeks" class="stack"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div class="panel-title">活動（Campaigns）</div>
          <button id="btnNewCampaign" class="pill">新增活動</button>
        </div>
        <div id="campaigns" class="stack"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div class="panel-title">變更紀錄</div>
        </div>
        <div id="logs" class="stack"></div>
      </section>
    </section>
  </main>

  <!-- ====== Modal: 新增專案 ====== -->
  <div id="modalProject" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <div class="modal-title">新增專案</div>
        <button id="btnCloseProjectModal" class="pill">關閉</button>
      </div>

      <div class="form">
        <label>
          <div class="label">年度</div>
          <input id="pYear" type="number" placeholder="例如 2026" />
        </label>

        <label>
          <div class="label">專案名稱（卡片大字）</div>
          <input id="pTitle" placeholder="例如：春天｜電池更換｜訊息主力" />
        </label>

        <div class="form-row">
          <label>
            <div class="label">主打品項</div>
            <select id="pProduct">
              <option value="電池更換">電池更換</option>
              <option value="螢幕更換">螢幕更換</option>
              <option value="主機板維修">主機板維修</option>
              <option value="資料救援">資料救援</option>
              <option value="Switch維修">Switch維修</option>
            </select>
          </label>

          <label>
            <div class="label">主題</div>
            <input id="pTheme" placeholder="春天 / 沙灘 / 中秋" />
          </label>
        </div>

        <div class="form-row">
          <label>
            <div class="label">平台</div>
            <select id="pPlatforms">
              <option value="META">META</option>
              <option value="GOOGLE">GOOGLE</option>
              <option value="META,GOOGLE">META + GOOGLE</option>
            </select>
          </label>

          <label>
            <div class="label">門市</div>
            <select id="pStore">
              <option value="勤美">勤美</option>
              <option value="沙鹿">沙鹿</option>
              <option value="勤美/沙鹿">勤美/沙鹿</option>
            </select>
          </label>
        </div>

        <div class="form-row">
          <label>
            <div class="label">目標</div>
            <select id="pObjective">
              <option value="MSG">MSG（訊息）</option>
              <option value="LEAD">LEAD（表單）</option>
              <option value="CALL">CALL（來電）</option>
            </select>
          </label>

          <label>
            <div class="label">狀態</div>
            <select id="pStatus">
              <option value="規劃中">規劃中</option>
              <option value="投放中">投放中</option>
              <option value="結案">結案</option>
            </select>
          </label>
        </div>

        <div class="form-row">
          <label>
            <div class="label">開始日</div>
            <input id="pStart" type="date" />
          </label>
          <label>
            <div class="label">結束日</div>
            <input id="pEnd" type="date" />
          </label>
        </div>

        <label>
          <div class="label">備註</div>
          <input id="pNotes" placeholder="可留空" />
        </label>

        <div class="actions">
          <button id="btnCreateProject" class="pill pill-primary">建立專案</button>
          <div id="msg" class="msg"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ====== Modal: 新增活動 ====== -->
  <div id="modalCampaign" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <div class="modal-title">新增活動</div>
        <button id="btnCloseCampaignModal" class="pill">關閉</button>
      </div>

      <div class="form">
        <label><div class="label">活動名稱</div><input id="cName" placeholder="例如 META_KM_BAT_SPR_MSG_202603" /></label>

        <div class="form-row">
          <label><div class="label">平台</div><input id="cPlatform" placeholder="META/GOOGLE" /></label>
          <label><div class="label">門市</div><input id="cStore" placeholder="勤美/沙鹿" /></label>
        </div>

        <div class="form-row">
          <label><div class="label">品項</div><input id="cProduct" placeholder="電池更換/資料救援..." /></label>
          <label><div class="label">主題</div><input id="cTheme" placeholder="春天/沙灘/中秋" /></label>
        </div>

        <div class="form-row">
          <label><div class="label">目標</div><input id="cObjective" placeholder="MSG/LEAD/CALL" /></label>
          <label><div class="label">狀態</div><input id="cStatus" placeholder="規劃中/投放中/結案" /></label>
        </div>

        <div class="form-row">
          <label><div class="label">開始日</div><input id="cStart" type="date" /></label>
          <label><div class="label">結束日</div><input id="cEnd" type="date" /></label>
        </div>

        <label><div class="label">預算備註</div><input id="cBudget" placeholder="每日 300 / 放大到 360" /></label>

        <div class="actions">
          <button id="btnCreateCampaign" class="pill pill-primary">建立活動</button>
          <div id="cmsg" class="msg"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ====== Modal: 新增變更 ====== -->
  <div id="modalLog" class="modal hidden" data-cid="">
    <div class="modal-card">
      <div class="modal-head">
        <div class="modal-title">新增變更紀錄</div>
        <button id="btnCloseLogModal" class="pill">關閉</button>
      </div>

      <div class="form">
        <div class="form-row">
          <label><div class="label">改動類型</div><input id="lType" placeholder="預算/素材/文案..." /></label>
          <label><div class="label">Before</div><input id="lBefore" /></label>
        </div>

        <div class="form-row">
          <label><div class="label">After</div><input id="lAfter" /></label>
          <label><div class="label">原因/假設</div><input id="lHypo" /></label>
        </div>

        <div class="actions">
          <button id="btnCreateLog" class="pill pill-primary">儲存紀錄</button>
          <div id="lmsg" class="msg"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* ========= 你只要改這兩行 ========= */
    const SUPABASE_URL = "https://udycidkswyqasnzwlmqv.supabase.co";
    const SUPABASE_ANON_KEY = "貼上你的 anon public key";
    /* ================================= */

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const $ = (id) => document.getElementById(id);
    const esc = (s="") => String(s??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");

    const viewProjects = $("viewProjects");
    const viewProjectDetail = $("viewProjectDetail");

    const topTitle = $("topTitle");
    const kicker = $("kicker");
    const btnBack = $("btnBack");
    const btnOpenNewProject = $("btnOpenNewProject");

    const modalProject = $("modalProject");
    const modalCampaign = $("modalCampaign");
    const modalLog = $("modalLog");

    function show(el){ el.classList.remove("hidden"); }
    function hide(el){ el.classList.add("hidden"); }

    function openProjectDetail(projectId){
      location.hash = `#project=${encodeURIComponent(projectId)}`;
    }
    function backToList(){
      location.hash = "";
    }
    function parseHashProjectId(){
      const h = location.hash || "";
      const m = h.match(/#project=([^&]+)/);
      return m ? decodeURIComponent(m[1]) : null;
    }

    async function listProjects(year){
      let q = supabase.from("projects").select("*").order("created_at",{ascending:false});
      if (year && year !== "ALL") q = q.eq("year", Number(year));
      const { data, error } = await q;
      if (error) throw error;
      return data || [];
    }
    async function listYears(){
      const { data, error } = await supabase.from("projects").select("year").order("year",{ascending:false});
      if (error) throw error;
      return [...new Set((data||[]).map(x=>x.year).filter(Boolean))];
    }
    async function createProject(payload){
      const { data, error } = await supabase.from("projects").insert(payload).select().single();
      if (error) throw error;
      return data;
    }
    async function getProject(id){
      const { data, error } = await supabase.from("projects").select("*").eq("id", id).single();
      if (error) throw error;
      return data;
    }
    async function updateProject(id, payload){
      const { data, error } = await supabase.from("projects").update(payload).eq("id", id).select().single();
      if (error) throw error;
      return data;
    }

    /* playbook */
    async function listWeeks(project_id){
      const { data, error } = await supabase.from("playbook_weeks")
        .select("*").eq("project_id", project_id).order("week",{ascending:true});
      if (error) throw error;
      return data || [];
    }
    async function ensureWeeks(project_id){
      const weeks = await listWeeks(project_id);
      const have = new Set(weeks.map(w=>w.week));
      const need = ["W1","W2","W3","W4"].filter(w=>!have.has(w));
      for (const w of need){
        const { error } = await supabase.from("playbook_weeks").insert({ project_id, week: w });
        if (error) throw error;
      }
    }
    async function saveWeek(id, focus, plan){
      const { error } = await supabase.from("playbook_weeks").update({focus, plan}).eq("id", id);
      if (error) throw error;
    }

    /* campaigns */
    async function listCampaigns(project_id){
      const { data, error } = await supabase.from("campaigns")
        .select("*").eq("project_id", project_id).order("created_at",{ascending:false});
      if (error) throw error;
      return data || [];
    }
    async function createCampaign(payload){
      const { data, error } = await supabase.from("campaigns").insert(payload).select().single();
      if (error) throw error;
      return data;
    }

    /* logs */
    async function listLogs(project_id){
      const camps = await listCampaigns(project_id);
      const ids = camps.map(c=>c.id);
      if (!ids.length) return [];
      const { data, error } = await supabase.from("change_log")
        .select("*").in("campaign_id", ids).order("timestamp",{ascending:false});
      if (error) throw error;
      const map = new Map(camps.map(c=>[c.id, c.campaign_name]));
      return (data||[]).map(r=>({...r, campaign_name: map.get(r.campaign_id)||""}));
    }
    async function createLog(payload){
      const { data, error } = await supabase.from("change_log").insert(payload).select().single();
      if (error) throw error;
      return data;
    }

    // ====== UI State ======
    let currentYear = "ALL";
    let currentProject = null;

    async function renderYears(){
      const dropdown = $("yearDropdown");
      const yearOptions = $("yearOptions");
      const years = await listYears();
      yearOptions.innerHTML = years.map(y=>`<div class="dropdown-item" data-year="${y}">${y}</div>`).join("");

      dropdown.querySelectorAll(".dropdown-item").forEach(el=>{
        el.onclick = async ()=>{
          currentYear = el.dataset.year;
          hide(dropdown);
          await renderProjects();
        };
      });
    }

    async function renderProjects(){
      const grid = $("grid");
      const projects = await listProjects(currentYear);
      grid.innerHTML = projects.map(p=>`
        <div class="card" data-id="${p.id}">
          <div class="big">${esc(p.title)}</div>
          <div class="meta">
            ${esc(p.year)}｜${esc(p.product||"")}｜${esc(p.theme||"")}<br/>
            ${esc(p.platforms||"")}｜${esc(p.store||"")}｜${esc(p.objective||"")}<br/>
            狀態：${esc(p.status||"")}
          </div>
        </div>
      `).join("");

      grid.querySelectorAll(".card").forEach(c=>{
        c.onclick = ()=> openProjectDetail(c.dataset.id);
      });
    }

    async function loadProjectDetail(projectId){
      currentProject = await getProject(projectId);

      // topbar
      kicker.textContent = "PROJECT";
      topTitle.textContent = currentProject.title;
      btnBack.classList.remove("hidden");
      btnOpenNewProject.classList.add("hidden");

      // show view
      viewProjects.classList.add("hidden");
      viewProjectDetail.classList.remove("hidden");

      // fill fields
      $("fYear").value = currentProject.year || "";
      $("fTitle").value = currentProject.title || "";
      $("fProduct").value = currentProject.product || "";
      $("fTheme").value = currentProject.theme || "";
      $("fPlatforms").value = currentProject.platforms || "";
      $("fStore").value = currentProject.store || "";
      $("fObjective").value = currentProject.objective || "";
      $("fStatus").value = currentProject.status || "";
      $("fStart").value = currentProject.start_date || "";
      $("fEnd").value = currentProject.end_date || "";
      $("fNotes").value = currentProject.notes || "";
      $("pmsg").textContent = "";

      await renderWeeks();
      await renderCampaigns();
      await renderLogs();
    }

    function showProjectsView(){
      kicker.textContent = "MARKETING";
      topTitle.textContent = "行銷廣告專案計劃表";
      btnBack.classList.add("hidden");
      btnOpenNewProject.classList.remove("hidden");

      viewProjectDetail.classList.add("hidden");
      viewProjects.classList.remove("hidden");
    }

    async function renderWeeks(){
      const wrap = $("weeks");
      const weeks = await listWeeks(currentProject.id);
      if (!weeks.length){
        wrap.innerHTML = `<div class="item"><div><div class="t">尚未建立 W1~W4</div><div class="s">點上方「一鍵建立 W1~W4」。</div></div></div>`;
        return;
      }
      wrap.innerHTML = "";
      weeks.forEach(w=>{
        const el = document.createElement("div");
        el.className = "item";
        el.innerHTML = `
          <div>
            <div class="t">${w.week}</div>
            <div class="s">Focus：<input data-f="focus" value="${esc(w.focus||"")}" /></div>
            <div class="s">Plan：<input data-f="plan" value="${esc(w.plan||"")}" /></div>
          </div>
          <div class="actions">
            <button class="pill" data-save>儲存</button>
          </div>
        `;
        el.querySelector("[data-save]").onclick = async ()=>{
          const focus = el.querySelector('[data-f="focus"]').value.trim();
          const plan = el.querySelector('[data-f="plan"]').value.trim();
          await saveWeek(w.id, focus, plan);
        };
        wrap.appendChild(el);
      });
    }

    async function renderCampaigns(){
      const wrap = $("campaigns");
      const list = await listCampaigns(currentProject.id);
      if (!list.length){
        wrap.innerHTML = `<div class="item"><div><div class="t">尚未建立活動</div><div class="s">點右上「新增活動」。</div></div></div>`;
        return;
      }
      wrap.innerHTML = "";
      list.forEach(c=>{
        const el = document.createElement("div");
        el.className = "item";
        el.innerHTML = `
          <div>
            <div class="t">${esc(c.campaign_name)}</div>
            <div class="s">${esc(c.platform)}｜${esc(c.store)}｜${esc(c.product)}｜${esc(c.theme)}｜${esc(c.objective)}｜${esc(c.status)}</div>
            <div class="s">期間：${c.start_date||"-"} ～ ${c.end_date||"-"}</div>
            <div class="s">預算：${esc(c.budget_note||"")}</div>
          </div>
          <div class="actions">
            <button class="pill" data-log>新增變更</button>
          </div>
        `;
        el.querySelector("[data-log]").onclick = ()=>{
          modalLog.dataset.cid = c.id;
          show(modalLog);
        };
        wrap.appendChild(el);
      });
    }

    async function renderLogs(){
      const wrap = $("logs");
      const list = await listLogs(currentProject.id);
      if (!list.length){
        wrap.innerHTML = `<div class="item"><div><div class="t">目前沒有變更紀錄</div><div class="s">在活動點「新增變更」即可。</div></div></div>`;
        return;
      }
      wrap.innerHTML = "";
      list.forEach(l=>{
        const el = document.createElement("div");
        el.className = "item";
        el.innerHTML = `
          <div>
            <div class="t">${esc(l.campaign_name)}｜${esc(l.change_type)}</div>
            <div class="s">${new Date(l.timestamp).toLocaleString()}</div>
            <div class="s">Before：${esc(l.before||"")}</div>
            <div class="s">After：${esc(l.after||"")}</div>
            <div class="s">原因/假設：${esc(l.hypothesis||"")}</div>
          </div>
        `;
        wrap.appendChild(el);
      });
    }

    // ====== Modal behaviors (關閉修好：按鈕/背景/ESC) ======
    function setupModal(modalEl, closeBtnId){
      const closeBtn = document.getElementById(closeBtnId);
      closeBtn?.addEventListener("click", ()=> hide(modalEl));
      modalEl.addEventListener("click",(e)=>{ if (e.target === modalEl) hide(modalEl); });
    }
    setupModal(modalProject, "btnCloseProjectModal");
    setupModal(modalCampaign, "btnCloseCampaignModal");
    setupModal(modalLog, "btnCloseLogModal");

    document.addEventListener("keydown",(e)=>{
      if (e.key !== "Escape") return;
      if (!modalProject.classList.contains("hidden")) hide(modalProject);
      if (!modalCampaign.classList.contains("hidden")) hide(modalCampaign);
      if (!modalLog.classList.contains("hidden")) hide(modalLog);
      const dd = $("yearDropdown");
      if (!dd.classList.contains("hidden")) hide(dd);
    });

    // ====== Wire UI ======
    $("yearPill").addEventListener("click", ()=>{
      const dd = $("yearDropdown");
      dd.classList.contains("hidden") ? show(dd) : hide(dd);
    });
    document.addEventListener("click",(e)=>{
      const dd = $("yearDropdown");
      if (!dd.contains(e.target) && e.target !== $("yearPill")) hide(dd);
    });

    btnOpenNewProject.addEventListener("click", ()=> show(modalProject));
    btnBack.addEventListener("click", ()=> backToList());

    $("btnCreateProject").addEventListener("click", async ()=>{
      const msg = $("msg");
      msg.textContent = "";

      const year = Number($("pYear").value.trim());
      const title = $("pTitle").value.trim();
      const product = $("pProduct").value;
      const theme = $("pTheme").value.trim();
      const platforms = $("pPlatforms").value;
      const store = $("pStore").value;
      const objective = $("pObjective").value;
      const status = $("pStatus").value;
      const start_date = $("pStart").value || null;
      const end_date = $("pEnd").value || null;
      const notes = $("pNotes").value.trim();

      if (!year || year < 2000){ msg.textContent = "年度請填正確（例如 2026）"; return; }
      if (!title){ msg.textContent = "專案名稱必填"; return; }

      try{
        const p = await createProject({ year, title, product, theme, platforms, store, objective, status, start_date, end_date, notes });
        hide(modalProject);

        // 清空欄位
        $("pYear").value=""; $("pTitle").value=""; $("pTheme").value=""; $("pStart").value=""; $("pEnd").value=""; $("pNotes").value="";

        await renderYears();
        await renderProjects();

        // 直接進入新專案
        openProjectDetail(p.id);
      }catch(e){
        msg.textContent = "建立失敗：" + e.message;
      }
    });

    $("btnInitWeeks").addEventListener("click", async ()=>{
      await ensureWeeks(currentProject.id);
      await renderWeeks();
    });

    $("btnSaveProject").addEventListener("click", async ()=>{
      const pmsg = $("pmsg");
      pmsg.textContent = "";
      try{
        currentProject = await updateProject(currentProject.id, {
          year: Number($("fYear").value),
          title: $("fTitle").value.trim(),
          product: $("fProduct").value.trim(),
          theme: $("fTheme").value.trim(),
          platforms: $("fPlatforms").value.trim(),
          store: $("fStore").value.trim(),
          objective: $("fObjective").value.trim(),
          status: $("fStatus").value.trim(),
          start_date: $("fStart").value || null,
          end_date: $("fEnd").value || null,
          notes: $("fNotes").value.trim(),
        });
        topTitle.textContent = currentProject.title;
        pmsg.textContent = "已儲存 ✅";
        setTimeout(()=>pmsg.textContent="",1200);
      }catch(e){
        pmsg.textContent = "儲存失敗：" + e.message;
      }
    });

    $("btnNewCampaign").addEventListener("click", ()=>{
      // 預填
      $("cName").value = "";
      $("cPlatform").value = currentProject.platforms || "META";
      $("cStore").value = currentProject.store || "勤美";
      $("cProduct").value = currentProject.product || "";
      $("cTheme").value = currentProject.theme || "";
      $("cObjective").value = currentProject.objective || "MSG";
      $("cStatus").value = currentProject.status || "規劃中";
      $("cStart").value = currentProject.start_date || "";
      $("cEnd").value = currentProject.end_date || "";
      $("cBudget").value = "";
      $("cmsg").textContent = "";
      show(modalCampaign);
    });

    $("btnCreateCampaign").addEventListener("click", async ()=>{
      const cmsg = $("cmsg");
      cmsg.textContent = "";
      const campaign_name = $("cName").value.trim();
      if (!campaign_name){ cmsg.textContent="活動名稱必填"; return; }

      try{
        await createCampaign({
          project_id: currentProject.id,
          month_id: null,
          platform: $("cPlatform").value.trim(),
          store: $("cStore").value.trim(),
          product: $("cProduct").value.trim(),
          theme: $("cTheme").value.trim(),
          objective: $("cObjective").value.trim(),
          campaign_name,
          start_date: $("cStart").value || null,
          end_date: $("cEnd").value || null,
          budget_note: $("cBudget").value.trim(),
          status: $("cStatus").value.trim() || "規劃中"
        });
        hide(modalCampaign);
        await renderCampaigns();
        await renderLogs();
      }catch(e){
        cmsg.textContent="建立失敗：" + e.message;
      }
    });

    $("btnCreateLog").addEventListener("click", async ()=>{
      const lmsg = $("lmsg");
      lmsg.textContent = "";
      const cid = modalLog.dataset.cid;
      if (!cid){ lmsg.textContent="請先從活動點『新增變更』"; return; }

      try{
        await createLog({
          campaign_id: cid,
          change_type: $("lType").value.trim() || "其他",
          before: $("lBefore").value.trim(),
          after: $("lAfter").value.trim(),
          hypothesis: $("lHypo").value.trim(),
        });
        hide(modalLog);
        $("lType").value=""; $("lBefore").value=""; $("lAfter").value=""; $("lHypo").value="";
        await renderLogs();
      }catch(e){
        lmsg.textContent="儲存失敗：" + e.message;
      }
    });

    // ====== Router (hash) ======
    window.addEventListener("hashchange", async ()=>{
      const pid = parseHashProjectId();
      if (pid){
        await loadProjectDetail(pid);
      }else{
        showProjectsView();
        await renderYears();
        await renderProjects();
      }
    });

    // ====== Init ======
    (async ()=>{
      const pid = parseHashProjectId();
      if (pid){
        await loadProjectDetail(pid);
      }else{
        showProjectsView();
        await renderYears();
        await renderProjects();
      }
    })();
  </script>
</body>
</html>
