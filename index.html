<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>黑盒子｜行銷廣告專案</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --brand: #AE8E53; --bg: #F6F5F2; --paper: #fff; --line: rgba(21,21,21,.10); --r: 20px; }
    * { box-sizing: border-box; }
    body { background: var(--bg); color: #151515; font-family: system-ui, sans-serif; margin: 0; }
    header { position: sticky; top: 0; z-index: 100; background: rgba(246,245,242,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--line); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
    h1 { margin: 0; font-size: 20px; font-weight: 900; }
    .btn { border: 1px solid var(--line); background: #fff; padding: 10px 18px; border-radius: 999px; font-weight: 900; cursor: pointer; transition: 0.2s; font-size: 14px; }
    .btn.primary { background: var(--brand); color: #fff; border-color: var(--brand); }
    main { max-width: 1000px; margin: 0 auto; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .card { background: #fff; padding: 20px; border-radius: var(--r); border: 1px solid var(--line); cursor: pointer; }
    .hidden { display: none !important; }
    .modal { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; padding: 16px; }
    .modal-content { background: #fff; width: 100%; max-width: 500px; border-radius: var(--r); padding: 24px; }
    .form-group { margin-bottom: 12px; }
    label { display: block; font-size: 12px; font-weight: 900; color: #888; margin-bottom: 4px; }
    input, select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--line); outline: none; }
  </style>
</head>
<body>

  <header>
    <h1>行銷廣告專案</h1>
    <div id="nav">
      <button id="btnOpenAdd" class="btn primary">＋ 新增專案</button>
      <button id="btnBack" class="btn hidden">← 回列表</button>
    </div>
  </header>

  <main>
    <div id="listPage" class="grid">載入中...</div>
    <div id="detailPage" class="hidden" style="background:#fff; padding:24px; border-radius:var(--r); border:1px solid var(--line);">
      <h2 id="detTitle" style="margin-top:0"></h2>
      <div id="detContent"></div>
      <div style="margin-top:20px; display:flex; gap:10px;">
        <button id="btnSave" class="btn primary">儲存</button>
        <button id="btnDel" class="btn" style="color:red">刪除</button>
      </div>
    </div>
  </main>

  <div id="addModal" class="modal hidden">
    <div class="modal-content">
      <h2 style="margin-top:0">新增專案</h2>
      <div class="form-group"><label>標題</label><input id="pTitle"></div>
      <div class="form-group"><label>門市</label><select id="pStore"><option>勤美公益店</option><option>沙鹿站前店</option></select></div>
      <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:20px;">
        <button id="btnCancel" class="btn">取消</button>
        <button id="btnConfirm" class="btn primary">確認建立</button>
      </div>
    </div>
  </div>

  <script>
    // 關鍵修正：移除所有重複宣告，只在最頂層定義一次
    (function() {
      const URL = "https://udycidkswyqasnzwlmqv.supabase.co";
      const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkeWNpZGtzd3lxYXNuendsbXF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2ODYzNzUsImV4cCI6MjA4ODI2MjM3NX0.Gu68eely_7xJrRBAuevEXzPt93Hnzr1fVwnz3SSp3pk";
      const client = window.supabase.createClient(URL, KEY);

      const listPage = document.getElementById('listPage');
      const detailPage = document.getElementById('detailPage');
      const addModal = document.getElementById('addModal');
      const btnBack = document.getElementById('btnBack');
      const btnOpenAdd = document.getElementById('btnOpenAdd');

      async function fetchAll() {
        listPage.innerHTML = '讀取中...';
        const { data, error } = await client.from('projects').select('*').order('created_at', { ascending: false });
        if (error) { listPage.innerHTML = '讀取失敗'; return; }
        listPage.innerHTML = data.map(p => `
          <div class="card" onclick="window.viewDetail('${p.id}')">
            <div style="font-weight:900;">${p.title}</div>
            <div style="font-size:12px; color:#888;">${p.year || 2026} | ${p.store || ''}</div>
          </div>
        `).join('') || '目前沒有專案';
      }

      window.viewDetail = async function(id) {
        listPage.classList.add('hidden');
        btnOpenAdd.classList.add('hidden');
        detailPage.classList.remove('hidden');
        btnBack.classList.remove('hidden');
        const { data } = await client.from('projects').select('*').eq('id', id).single();
        if (data) {
          document.getElementById('detTitle').innerText = data.title;
          document.getElementById('detContent').innerHTML = `
            <div class="form-group"><label>編輯標題</label><input id="edTitle" value="${data.title}"></div>
            <div class="form-group"><label>備註</label><textarea id="edNotes" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd;">${data.notes || ''}</textarea></div>
          `;
          document.getElementById('btnSave').onclick = async () => {
            await client.from('projects').update({ title: document.getElementById('edTitle').value, notes: document.getElementById('edNotes').value }).eq('id', id);
            alert('已儲存');
          };
          document.getElementById('btnDel').onclick = async () => {
            if(confirm('確定刪除？')) { await client.from('projects').delete().eq('id', id); location.reload(); }
          };
        }
      };

      btnOpenAdd.onclick = () => addModal.classList.remove('hidden');
      document.getElementById('btnCancel').onclick = () => addModal.classList.add('hidden');
      btnBack.onclick = () => location.reload();

      document.getElementById('btnConfirm').onclick = async () => {
        const t = document.getElementById('pTitle').value;
        if(!t) return;
        await client.from('projects').insert([{ title: t, year: 2026, store: document.getElementById('pStore').value }]);
        location.reload();
      };

      fetchAll();
    })();
  </script>
</body>
</html>
