<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>行銷廣告專案計劃表</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header class="topbar">
    <h1 class="title">行銷廣告專案計劃表</h1>
    <button id="btnOpenNewProject" class="pill pill-white">新增專案按鈕</button>
  </header>

  <main class="page">
    <section class="toolbar">
      <div class="pill pill-dark" id="yearPill">
        年度篩選器
      </div>

      <div id="yearDropdown" class="dropdown hidden">
        <div class="dropdown-item" data-year="ALL">全部年度</div>
        <div id="yearOptions"></div>
      </div>
    </section>

    <section id="grid" class="grid"></section>
  </main>

  <!-- 新增專案 Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <div class="modal-title">新增專案</div>
        <button id="btnCloseModal" class="pill">關閉</button>
      </div>

      <div class="form">
        <label>
          <div class="label">年度</div>
          <input id="pYear" type="number" placeholder="例如 2026" />
        </label>

        <label>
          <div class="label">專案名稱（卡片大字）</div>
          <input id="pTitle" placeholder="例如：春天｜電池更換｜訊息主力" />
        </label>

        <div class="form-row">
          <label>
            <div class="label">主打品項</div>
            <select id="pProduct">
              <option value="電池更換">電池更換</option>
              <option value="螢幕更換">螢幕更換</option>
              <option value="主機板維修">主機板維修</option>
              <option value="資料救援">資料救援</option>
              <option value="Switch維修">Switch維修</option>
            </select>
          </label>

          <label>
            <div class="label">主題</div>
            <input id="pTheme" placeholder="春天 / 沙灘 / 中秋" />
          </label>
        </div>

        <div class="form-row">
          <label>
            <div class="label">平台</div>
            <select id="pPlatforms">
              <option value="META">META</option>
              <option value="GOOGLE">GOOGLE</option>
              <option value="META,GOOGLE">META + GOOGLE</option>
            </select>
          </label>

          <label>
            <div class="label">門市</div>
            <select id="pStore">
              <option value="勤美">勤美</option>
              <option value="沙鹿">沙鹿</option>
              <option value="勤美/沙鹿">勤美/沙鹿</option>
            </select>
          </label>
        </div>

        <div class="form-row">
          <label>
            <div class="label">目標</div>
            <select id="pObjective">
              <option value="MSG">MSG（訊息）</option>
              <option value="LEAD">LEAD（表單）</option>
              <option value="CALL">CALL（來電）</option>
            </select>
          </label>

          <label>
            <div class="label">狀態</div>
            <select id="pStatus">
              <option value="規劃中">規劃中</option>
              <option value="投放中">投放中</option>
              <option value="結案">結案</option>
            </select>
          </label>
        </div>

        <div class="form-row">
          <label>
            <div class="label">開始日</div>
            <input id="pStart" type="date" />
          </label>

          <label>
            <div class="label">結束日</div>
            <input id="pEnd" type="date" />
          </label>
        </div>

        <label>
          <div class="label">備註</div>
          <input id="pNotes" placeholder="可留空" />
        </label>

        <div class="actions">
          <button id="btnCreateProject" class="pill pill-primary">建立專案</button>
          <div id="msg" class="msg"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
  <script>
    Planner.initProjectsIndex();
  </script>
</body>
</html>
