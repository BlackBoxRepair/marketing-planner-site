<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>行銷廣告專案計劃表</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --brand:#AE8E53; --bg:#F6F5F2; --paper:#fff; --paper2:#FBFAF8;
      --text:#151515; --muted:rgba(21,21,21,.58); --line:rgba(21,21,21,.10);
      --shadow:0 12px 32px rgba(0,0,0,.08); --r:22px; --focus:rgba(174,142,83,.22);
    }
    *{box-sizing:border-box} html,body{margin:0}
    body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"PingFang TC","Microsoft JhengHei",Arial;letter-spacing:.2px}
    .hidden{display:none!important}

    header{
      position:sticky;top:0;z-index:20;
      background:rgba(246,245,242,.92);backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
      padding:16px 18px;display:flex;justify-content:space-between;align-items:flex-end;gap:12px;
    }
    .kicker{font-size:12px;letter-spacing:.22em;font-weight:900;color:var(--brand)}
    h1{margin:6px 0 0;font-size:28px;font-weight:900}
    .btn{
      border:1px solid var(--line);background:rgba(255,255,255,.9);
      padding:10px 14px;border-radius:999px;font-weight:900;cursor:pointer;
      box-shadow:0 8px 16px rgba(0,0,0,.06);transition:.12s;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
    .btn.ghost{background:transparent;box-shadow:none}

    main{max-width:1100px;margin:0 auto;padding:18px 18px 60px}
    .notice{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;box-shadow:0 8px 20px rgba(0,0,0,.06);margin:10px 0 16px;color:rgba(21,21,21,.75)}
    .bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:6px 0 16px}
    select,input{
      width:100%;padding:12px 12px;border-radius:16px;border:1px solid var(--line);
      background:var(--paper2);outline:none;font-size:14px;transition:.12s;
    }
    select:focus,input:focus{background:#fff;border-color:rgba(174,142,83,.45);box-shadow:0 0 0 4px var(--focus)}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
    @media(max-width:980px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:520px){.grid{grid-template-columns:1fr}}
    .card{
      background:var(--paper);border:1px solid rgba(21,21,21,.06);border-radius:var(--r);
      padding:16px;box-shadow:0 10px 24px rgba(0,0,0,.06);cursor:pointer;min-height:160px;
      display:flex;flex-direction:column;justify-content:space-between;
    }
    .card .title{font-size:18px;font-weight:950;line-height:1.2}
    .card .meta{margin-top:10px;font-size:12px;color:var(--muted);line-height:1.55}

    .box{background:var(--paper);border:1px solid rgba(21,21,21,.06);border-radius:var(--r);padding:16px;box-shadow:0 10px 24px rgba(0,0,0,.06);margin:12px 0}
    .boxhead{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
    .boxhead .h{font-weight:950}
    .stack{display:flex;flex-direction:column;gap:10px}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .item{border:1px solid rgba(21,21,21,.08);border-radius:16px;padding:12px;background:#fff;display:flex;justify-content:space-between;gap:10px}
    .item .t{font-weight:950}
    .item .s{margin-top:6px;font-size:12px;color:var(--muted);line-height:1.55}
    .muted{font-size:12px;color:var(--muted)}

    /* modal: 外層不滾，卡片內滾 -> 避免「半邊不能點」 */
    .modal{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.22);display:flex;align-items:center;justify-content:center;padding:16px;overflow:hidden}
    .modalcard{width:min(900px,100%);max-height:calc(100vh - 32px);overflow:auto;-webkit-overflow-scrolling:touch;background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px}
    .modalhead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(21,21,21,.06)}
    label span{display:block;font-size:12px;color:rgba(21,21,21,.55);font-weight:900;margin-bottom:6px}
    .formgrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
    @media(max-width:900px){.formgrid{grid-template-columns:1fr}}
    .full{grid-column:1/-1}
  </style>
</head>

<body>
  <header>
    <div>
      <div class="kicker" id="kicker">MARKETING</div>
      <h1 id="topTitle">行銷廣告專案計劃表</h1>
    </div>
    <div class="row">
      <button id="btnBack" class="btn ghost hidden">回選單</button>
      <button id="btnNewProject" class="btn primary">新增專案</button>
    </div>
  </header>

  <main>
    <div id="sysMsg" class="notice hidden"></div>

    <!-- List -->
    <section id="viewList">
      <div class="bar">
        <select id="yearSelect">
          <option value="ALL">全部年度</option>
        </select>
      </div>
      <div id="grid" class="grid"></div>
    </section>

    <!-- Detail -->
    <section id="viewDetail" class="hidden">
      <section class="box">
        <div class="boxhead">
          <div class="h">專案資訊</div>
          <div class="row">
            <button id="btnInitWeeks" class="btn">一鍵建立 W1~W4</button>
            <button id="btnSaveProject" class="btn primary">儲存</button>
          </div>
        </div>

        <div class="formgrid">
          <label><span>年度</span><input id="fYear" type="number"></label>
          <label class="full"><span>專案名稱</span><input id="fTitle"></label>
          <label><span>品項</span><input id="fProduct"></label>

          <label><span>主題</span><input id="fTheme"></label>
          <label><span>平台</span><input id="fPlatforms"></label>
          <label><span>門市</span><input id="fStore"></label>

          <label><span>目標</span><input id="fObjective"></label>
          <label><span>狀態</span><input id="fStatus"></label>
          <label><span>開始日</span><input id="fStart" type="date"></label>

          <label><span>結束日</span><input id="fEnd" type="date"></label>
          <label class="full"><span>備註</span><input id="fNotes"></label>
        </div>

        <div id="pmsg" class="muted"></div>
      </section>

      <section class="box">
        <div class="boxhead"><div class="h">W1~W4 投放節奏</div></div>
        <div id="weeks" class="stack"></div>
      </section>

      <section class="box">
        <div class="boxhead">
          <div class="h">活動（Campaigns）</div>
          <button id="btnNewCampaign" class="btn">新增活動</button>
        </div>
        <div id="campaigns" class="stack"></div>
      </section>

      <section class="box">
        <div class="boxhead"><div class="h">變更紀錄</div></div>
        <div id="logs" class="stack"></div>
      </section>
    </section>
  </main>

  <!-- Modal: Project -->
  <div id="mProject" class="modal hidden">
    <div class="modalcard">
      <div class="modalhead">
        <div class="h">新增專案</div>
        <button class="btn" data-close="mProject">關閉</button>
      </div>

      <div class="formgrid">
        <label><span>年度</span><input id="pYear" type="number" placeholder="例如 2026"></label>
        <label class="full"><span>專案名稱</span><input id="pTitle" placeholder="例如：春天｜電池更換｜訊息主力"></label>

        <label><span>品項</span><input id="pProduct" placeholder="電池更換/資料救援..."></label>
        <label><span>主題</span><input id="pTheme" placeholder="春天/沙灘/中秋"></label>
        <label><span>平台</span><input id="pPlatforms" placeholder="META/GOOGLE/META,GOOGLE"></label>

        <label><span>門市</span><input id="pStore" placeholder="勤美/沙鹿"></label>
        <label><span>目標</span><input id="pObjective" placeholder="MSG/LEAD/CALL"></label>
        <label><span>狀態</span><input id="pStatus" placeholder="規劃中/投放中/結案"></label>

        <label><span>開始日</span><input id="pStart" type="date"></label>
        <label><span>結束日</span><input id="pEnd" type="date"></label>
        <label class="full"><span>備註</span><input id="pNotes"></label>
      </div>

      <div class="row" style="margin-top:12px">
        <button id="btnCreateProject" class="btn primary">建立專案</button>
        <div id="msg" class="muted"></div>
      </div>
    </div>
  </div>

  <!-- Modal: Campaign -->
  <div id="mCampaign" class="modal hidden">
    <div class="modalcard">
      <div class="modalhead">
        <div class="h">新增活動</div>
        <button class="btn" data-close="mCampaign">關閉</button>
      </div>

      <div class="formgrid">
        <label class="full"><span>活動名稱</span><input id="cName" placeholder="META_KM_BAT_SPR_MSG_202603"></label>
        <label><span>平台</span><input id="cPlatform"></label>
        <label><span>門市</span><input id="cStore"></label>
        <label><span>品項</span><input id="cProduct"></label>
        <label><span>主題</span><input id="cTheme"></label>
        <label><span>目標</span><input id="cObjective"></label>
        <label><span>狀態</span><input id="cStatus"></label>
        <label><span>開始日</span><input id="cStart" type="date"></label>
        <label><span>結束日</span><input id="cEnd" type="date"></label>
        <label class="full"><span>預算備註</span><input id="cBudget"></label>
      </div>

      <div class="row" style="margin-top:12px">
        <button id="btnCreateCampaign" class="btn primary">建立活動</button>
        <div id="cmsg" class="muted"></div>
      </div>
    </div>
  </div>

  <!-- Modal: Log -->
  <div id="mLog" class="modal hidden" data-cid="">
    <div class="modalcard">
      <div class="modalhead">
        <div class="h">新增變更紀錄</div>
        <button class="btn" data-close="mLog">關閉</button>
      </div>

      <div class="formgrid">
        <label><span>改動類型</span><input id="lType" placeholder="預算/素材/文案..."></label>
        <label><span>Before</span><input id="lBefore"></label>
        <label><span>After</span><input id="lAfter"></label>
        <label class="full"><span>原因/假設</span><input id="lHypo"></label>
      </div>

      <div class="row" style="margin-top:12px">
        <button id="btnCreateLog" class="btn primary">儲存紀錄</button>
        <div id="lmsg" class="muted"></div>
      </div>
    </div>
  </div>

  <script>
  /* Supabase */
  const SUPABASE_URL = "https://udycidkswyqasnzwlmqv.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkeWNpZGtzd3lxYXNuendsbXF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2ODYzNzUsImV4cCI6MjA4ODI2MjM3NX0.Gu68eely_7xJrRBAuevEXzPt93Hnzr1fVwnz3SSp3pk";
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  /* helpers */
  const $ = (id)=>document.getElementById(id);
  const show = (el)=>el.classList.remove("hidden");
  const hide = (el)=>el.classList.add("hidden");
  const esc = (s="")=>String(s??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
  async function q(p){ const {data,error}=await p; if(error) throw error; return data; }

  const S = { year:"ALL", project:null };

  function notice(msg){
    const box = $("sysMsg");
    if(!msg){ hide(box); box.textContent=""; return; }
    box.textContent = msg; show(box);
  }

  function viewList(){
    $("kicker").textContent="MARKETING";
    $("topTitle").textContent="行銷廣告專案計劃表";
    hide($("btnBack")); show($("btnNewProject"));
    show($("viewList")); hide($("viewDetail"));
  }
  function viewDetail(title){
    $("kicker").textContent="PROJECT";
    $("topTitle").textContent=title||"專案";
    show($("btnBack")); hide($("btnNewProject"));
    hide($("viewList")); show($("viewDetail"));
  }

  const pidFromHash=()=> (location.hash.match(/#project=([^&]+)/)||[])[1] ? decodeURIComponent((location.hash.match(/#project=([^&]+)/)||[])[1]) : null;
  const openProject=(id)=> location.hash = `#project=${encodeURIComponent(id)}`;
  const back=()=> location.hash="";

  /* modals */
  function setupModal(id){
    const m=$(id);
    m.addEventListener("click",e=>{ if(e.target===m) hide(m); });
    document.querySelectorAll(`[data-close="${id}"]`).forEach(b=>b.onclick=()=>hide(m));
    return m;
  }
  const mProject=setupModal("mProject"), mCampaign=setupModal("mCampaign"), mLog=setupModal("mLog");

  document.addEventListener("keydown",(e)=>{
    if(e.key!=="Escape") return;
    [mProject,mCampaign,mLog].forEach(m=>!m.classList.contains("hidden")&&hide(m));
  });

  /* DB API */
  const api = {
    years: async()=> {
      const rows = await q(supabase.from("projects").select("year").order("year",{ascending:false}));
      return [...new Set(rows.map(r=>r.year).filter(Boolean))];
    },
    projects: async(year)=>{
      let p=supabase.from("projects").select("*").order("created_at",{ascending:false});
      if(year && year!=="ALL") p=p.eq("year",Number(year));
      return await q(p);
    },
    createProject: async(p)=> await q(supabase.from("projects").insert(p).select().single()),
    getProject: async(id)=> await q(supabase.from("projects").select("*").eq("id",id).single()),
    updateProject: async(id,p)=> await q(supabase.from("projects").update(p).eq("id",id).select().single()),
    weeks: async(pid)=> await q(supabase.from("playbook_weeks").select("*").eq("project_id",pid).order("week",{ascending:true})),
    ensureWeeks: async(pid)=>{
      const have = new Set((await api.weeks(pid)).map(w=>w.week));
      for(const w of ["W1","W2","W3","W4"]) if(!have.has(w)) await q(supabase.from("playbook_weeks").insert({project_id:pid,week:w}));
    },
    saveWeek: async(id,focus,plan)=> { await q(supabase.from("playbook_weeks").update({focus,plan}).eq("id",id)); },
    campaigns: async(pid)=> await q(supabase.from("campaigns").select("*").eq("project_id",pid).order("created_at",{ascending:false})),
    createCampaign: async(c)=> await q(supabase.from("campaigns").insert(c).select().single()),
    logs: async(pid)=>{
      const camps = await api.campaigns(pid);
      const ids = camps.map(c=>c.id); if(!ids.length) return [];
      const logs = await q(supabase.from("change_log").select("*").in("campaign_id",ids).order("timestamp",{ascending:false}));
      const map = new Map(camps.map(c=>[c.id,c.campaign_name]));
      return logs.map(r=>({...r,campaign_name:map.get(r.campaign_id)||""}));
    },
    createLog: async(l)=> await q(supabase.from("change_log").insert(l).select().single()),
  };

  /* render */
  async function renderYearSelect(){
    const sel=$("yearSelect");
    try{
      const years = await api.years();
      sel.innerHTML = `<option value="ALL">全部年度</option>` + years.map(y=>`<option value="${y}">${y}</option>`).join("");
    }catch(e){
      // 不阻斷 UI
      sel.innerHTML = `<option value="ALL">全部年度</option>`;
      notice("⚠️ 年度讀取失敗（可能是 RLS/權限）： " + e.message);
    }
    sel.value = S.year;
    sel.onchange = async()=>{ S.year=sel.value; await renderProjects(); };
  }

  async function renderProjects(){
    const grid=$("grid");
    try{
      const list=await api.projects(S.year);
      if(!list.length){
        grid.innerHTML = `<div class="card" style="grid-column:1/-1;cursor:default">
          <div class="title">尚無專案</div><div class="meta">點右上「新增專案」建立第一個。</div></div>`;
        return;
      }
      grid.innerHTML = list.map(p=>`
        <div class="card" data-id="${p.id}">
          <div class="title">${esc(p.title)}</div>
          <div class="meta">${esc(p.year)}｜${esc(p.product||"")}｜${esc(p.theme||"")}<br>
          ${esc(p.platforms||"")}｜${esc(p.store||"")}｜${esc(p.objective||"")}<br>
          狀態：${esc(p.status||"")}</div>
        </div>`).join("");
      grid.querySelectorAll(".card[data-id]").forEach(c=>c.onclick=()=>openProject(c.dataset.id));
    }catch(e){
      grid.innerHTML = `<div class="card" style="grid-column:1/-1;cursor:default">
        <div class="title">資料載入失敗</div><div class="meta">${esc(e.message)}</div></div>`;
      notice("⚠️ 專案列表讀取失敗（可能是 RLS/權限）： " + e.message);
    }
  }

  async function renderWeeks(){
    const wrap=$("weeks");
    try{
      const weeks=await api.weeks(S.project.id);
      if(!weeks.length){
        wrap.innerHTML = `<div class="item"><div><div class="t">尚未建立 W1~W4</div><div class="s">點上方按鈕建立。</div></div></div>`;
        return;
      }
      wrap.innerHTML="";
      weeks.forEach(w=>{
        const el=document.createElement("div");
        el.className="item";
        el.innerHTML = `
          <div>
            <div class="t">${w.week}</div>
            <div class="s">Focus：<input data-f="focus" value="${esc(w.focus||"")}"></div>
            <div class="s">Plan：<input data-f="plan" value="${esc(w.plan||"")}"></div>
          </div>
          <div class="row"><button class="btn" data-save>儲存</button></div>`;
        el.querySelector('[data-save]').onclick = async()=>{
          await api.saveWeek(w.id,
            el.querySelector('[data-f="focus"]').value.trim(),
            el.querySelector('[data-f="plan"]').value.trim()
          );
        };
        wrap.appendChild(el);
      });
    }catch(e){
      wrap.innerHTML = `<div class="item"><div><div class="t">讀取失敗</div><div class="s">${esc(e.message)}</div></div></div>`;
    }
  }

  async function renderCampaigns(){
    const wrap=$("campaigns");
    try{
      const list=await api.campaigns(S.project.id);
      if(!list.length){
        wrap.innerHTML = `<div class="item"><div><div class="t">尚未建立活動</div><div class="s">點右上新增活動。</div></div></div>`;
        return;
      }
      wrap.innerHTML="";
      list.forEach(c=>{
        const el=document.createElement("div");
        el.className="item";
        el.innerHTML = `
          <div>
            <div class="t">${esc(c.campaign_name)}</div>
            <div class="s">${esc(c.platform)}｜${esc(c.store)}｜${esc(c.product)}｜${esc(c.theme)}｜${esc(c.objective)}｜${esc(c.status)}</div>
            <div class="s">期間：${c.start_date||"-"} ～ ${c.end_date||"-"}</div>
            <div class="s">預算：${esc(c.budget_note||"")}</div>
          </div>
          <div class="row"><button class="btn" data-log>新增變更</button></div>`;
        el.querySelector('[data-log]').onclick=()=>{
          $("mLog").dataset.cid=c.id; show(mLog);
        };
        wrap.appendChild(el);
      });
    }catch(e){
      wrap.innerHTML = `<div class="item"><div><div class="t">讀取失敗</div><div class="s">${esc(e.message)}</div></div></div>`;
    }
  }

  async function renderLogs(){
    const wrap=$("logs");
    try{
      const list=await api.logs(S.project.id);
      if(!list.length){
        wrap.innerHTML = `<div class="item"><div><div class="t">目前沒有變更紀錄</div><div class="s">從活動按「新增變更」。</div></div></div>`;
        return;
      }
      wrap.innerHTML="";
      list.forEach(l=>{
        const el=document.createElement("div");
        el.className="item";
        el.innerHTML = `<div>
          <div class="t">${esc(l.campaign_name)}｜${esc(l.change_type)}</div>
          <div class="s">${new Date(l.timestamp).toLocaleString()}</div>
          <div class="s">Before：${esc(l.before||"")}</div>
          <div class="s">After：${esc(l.after||"")}</div>
          <div class="s">原因/假設：${esc(l.hypothesis||"")}</div>
        </div>`;
        wrap.appendChild(el);
      });
    }catch(e){
      wrap.innerHTML = `<div class="item"><div><div class="t">讀取失敗</div><div class="s">${esc(e.message)}</div></div></div>`;
    }
  }

  async function loadDetail(pid){
    S.project = await api.getProject(pid);
    viewDetail(S.project.title);
    $("fYear").value=S.project.year||"";
    $("fTitle").value=S.project.title||"";
    $("fProduct").value=S.project.product||"";
    $("fTheme").value=S.project.theme||"";
    $("fPlatforms").value=S.project.platforms||"";
    $("fStore").value=S.project.store||"";
    $("fObjective").value=S.project.objective||"";
    $("fStatus").value=S.project.status||"";
    $("fStart").value=S.project.start_date||"";
    $("fEnd").value=S.project.end_date||"";
    $("fNotes").value=S.project.notes||"";
    $("pmsg").textContent="";
    await renderWeeks(); await renderCampaigns(); await renderLogs();
  }

  /* ====== BIND EVENTS FIRST (關鍵：不會因為載入失敗導致按鈕無反應) ====== */
  $("btnBack").onclick = back;
  $("btnNewProject").onclick = ()=> show(mProject);

  $("btnCreateProject").onclick=async()=>{
    $("msg").textContent="";
    const year=Number($("pYear").value.trim());
    const title=$("pTitle").value.trim();
    if(!year||year<2000) return $("msg").textContent="年度請填正確（例如 2026）";
    if(!title) return $("msg").textContent="專案名稱必填";
    try{
      const p=await api.createProject({
        year,title,
        product:$("pProduct").value.trim(),
        theme:$("pTheme").value.trim(),
        platforms:$("pPlatforms").value.trim(),
        store:$("pStore").value.trim(),
        objective:$("pObjective").value.trim(),
        status:$("pStatus").value.trim()||"規劃中",
        start_date:$("pStart").value||null,
        end_date:$("pEnd").value||null,
        notes:$("pNotes").value.trim(),
      });
      hide(mProject);
      await renderYearSelect(); await renderProjects();
      openProject(p.id);
    }catch(e){ $("msg").textContent="建立失敗："+e.message; notice("⚠️ 建立專案失敗（可能是 RLS/權限）： "+e.message); }
  };

  $("btnInitWeeks").onclick=async()=>{
    try{ await api.ensureWeeks(S.project.id); await renderWeeks(); }
    catch(e){ notice("⚠️ 建立 W1~W4 失敗： "+e.message); }
  };

  $("btnSaveProject").onclick=async()=>{
    try{
      S.project = await api.updateProject(S.project.id,{
        year:Number($("fYear").value),
        title:$("fTitle").value.trim(),
        product:$("fProduct").value.trim(),
        theme:$("fTheme").value.trim(),
        platforms:$("fPlatforms").value.trim(),
        store:$("fStore").value.trim(),
        objective:$("fObjective").value.trim(),
        status:$("fStatus").value.trim(),
        start_date:$("fStart").value||null,
        end_date:$("fEnd").value||null,
        notes:$("fNotes").value.trim(),
      });
      $("topTitle").textContent=S.project.title;
      $("pmsg").textContent="已儲存 ✅"; setTimeout(()=>{$("pmsg").textContent=""},1200);
    }catch(e){ $("pmsg").textContent="儲存失敗："+e.message; notice("⚠️ 儲存專案失敗： "+e.message); }
  };

  $("btnNewCampaign").onclick=()=>{
    $("cName").value="";
    $("cPlatform").value=S.project.platforms||"META";
    $("cStore").value=S.project.store||"勤美";
    $("cProduct").value=S.project.product||"";
    $("cTheme").value=S.project.theme||"";
    $("cObjective").value=S.project.objective||"MSG";
    $("cStatus").value=S.project.status||"規劃中";
    $("cStart").value=S.project.start_date||"";
    $("cEnd").value=S.project.end_date||"";
    $("cBudget").value="";
    $("cmsg").textContent="";
    show(mCampaign);
  };

  $("btnCreateCampaign").onclick=async()=>{
    $("cmsg").textContent="";
    const name=$("cName").value.trim();
    if(!name) return $("cmsg").textContent="活動名稱必填";
    try{
      await api.createCampaign({
        project_id:S.project.id, month_id:null,
        platform:$("cPlatform").value.trim(),
        store:$("cStore").value.trim(),
        product:$("cProduct").value.trim(),
        theme:$("cTheme").value.trim(),
        objective:$("cObjective").value.trim(),
        campaign_name:name,
        start_date:$("cStart").value||null,
        end_date:$("cEnd").value||null,
        budget_note:$("cBudget").value.trim(),
        status:$("cStatus").value.trim()||"規劃中"
      });
      hide(mCampaign);
      await renderCampaigns(); await renderLogs();
    }catch(e){ $("cmsg").textContent="建立失敗："+e.message; notice("⚠️ 建立活動失敗： "+e.message); }
  };

  $("btnCreateLog").onclick=async()=>{
    $("lmsg").textContent="";
    const cid=$("mLog").dataset.cid;
    if(!cid) return $("lmsg").textContent="請先從活動點『新增變更』";
    try{
      await api.createLog({
        campaign_id:cid,
        change_type:$("lType").value.trim()||"其他",
        before:$("lBefore").value.trim(),
        after:$("lAfter").value.trim(),
        hypothesis:$("lHypo").value.trim(),
      });
      hide(mLog);
      $("lType").value="";$("lBefore").value="";$("lAfter").value="";$("lHypo").value="";
      await renderLogs();
    }catch(e){ $("lmsg").textContent="儲存失敗："+e.message; notice("⚠️ 儲存變更失敗： "+e.message); }
  };

  /* router */
  window.addEventListener("hashchange", async()=>{
    const pid=pidFromHash();
    try{
      if(!pid){ viewList(); await renderYearSelect(); await renderProjects(); return; }
      await loadDetail(pid);
    }catch(e){ viewList(); notice("載入失敗（Supabase/RLS/網路）： "+e.message); }
  });

  /* init */
  (async()=>{
    try{
      viewList();
      await renderYearSelect();
      await renderProjects();
      const pid=pidFromHash();
      if(pid) await loadDetail(pid);
    }catch(e){
      notice("載入失敗（Supabase/RLS/網路）： "+e.message);
    }
  })();
</script>
</body>
</html>
